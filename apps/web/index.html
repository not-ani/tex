<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4efe5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#171312" media="(prefers-color-scheme: dark)" />
    <script>
      (() => {
        const storedTheme = window.localStorage.getItem("tex:theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme =
          storedTheme === "light" || storedTheme === "dark" || storedTheme === "system"
            ? storedTheme
            : "system";
        const isDark = theme === "dark" || (theme === "system" && prefersDark);
        document.documentElement.classList.toggle("dark", isDark);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap"
      rel="stylesheet"
    />
    <title>Tex</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
